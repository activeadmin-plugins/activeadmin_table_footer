name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # capybara_active_admin >= 1.0 (the version we test against) requires Ruby >= 3.3
        ruby: ["3.3", "3.4"]
        gemfile:
          - gemfiles/activeadmin_3.5.gemfile
          - gemfiles/activeadmin_4.0.gemfile
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec
        env:
          COVERAGE: ${{ matrix.ruby == '3.4' && matrix.gemfile == 'gemfiles/activeadmin_4.0.gemfile' && 'true' || 'false' }}

      - name: Generate badge.json
        if: matrix.ruby == '3.4' && matrix.gemfile == 'gemfiles/activeadmin_4.0.gemfile'
        run: |
          LAST_RUN="coverage/.last_run.json"
          if [ ! -f "$LAST_RUN" ]; then
            mkdir -p badge
            echo '{"schemaVersion":1,"label":"coverage","message":"unknown","color":"lightgrey"}' > badge/badge.json
            exit 0
          fi
          PERCENT=$(ruby -rjson -e "puts JSON.parse(File.read('$LAST_RUN')).dig('result','line').round(1)")
          PERCENT_NUM=$(ruby -rjson -e "puts JSON.parse(File.read('$LAST_RUN')).dig('result','line')")
          if ruby -e "exit(($PERCENT_NUM >= 90) ? 0 : 1)"; then COLOR="brightgreen"
          elif ruby -e "exit(($PERCENT_NUM >= 75) ? 0 : 1)"; then COLOR="green"
          elif ruby -e "exit(($PERCENT_NUM >= 60) ? 0 : 1)"; then COLOR="yellow"
          else COLOR="red"; fi
          mkdir -p badge
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PERCENT}%\",\"color\":\"${COLOR}\"}" > badge/badge.json

      - name: Upload badge artifact
        if: matrix.ruby == '3.4' && matrix.gemfile == 'gemfiles/activeadmin_4.0.gemfile'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: badge

  deploy-coverage:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: coverage

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: coverage

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
